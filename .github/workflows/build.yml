name: Build/release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      platform:
        description: 'Build platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - win
          - mac
          - linux
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include: >-
          ${{ fromJSON(
            (github.event_name == 'push' || inputs.platform == 'all') && '[
              {"os": "macos-latest",      "arch": "arm64", "build": "build:mac:arm64"},
              {"os": "macos-15-intel",    "arch": "x64",   "build": "build:mac:x64"},
              {"os": "windows-latest",    "arch": "x64",   "build": "build:win:x64"},
              {"os": "windows-11-arm",    "arch": "arm64", "build": "build:win:arm64"},
              {"os": "ubuntu-latest",     "arch": "x64",   "build": "build:linux:x64"},
              {"os": "ubuntu-24.04-arm",  "arch": "arm64", "build": "build:linux:arm64"}
            ]' ||
            inputs.platform == 'mac' && '[
              {"os": "macos-latest",      "arch": "arm64", "build": "build:mac:arm64"},
              {"os": "macos-15-intel",    "arch": "x64",   "build": "build:mac:x64"}
            ]' ||
            inputs.platform == 'win' && '[
              {"os": "windows-latest",    "arch": "x64",   "build": "build:win:x64"},
              {"os": "windows-11-arm",    "arch": "arm64", "build": "build:win:arm64"}
            ]' ||
            inputs.platform == 'linux' && '[
              {"os": "ubuntu-latest",     "arch": "x64",   "build": "build:linux:x64"},
              {"os": "ubuntu-24.04-arm",  "arch": "arm64", "build": "build:linux:arm64"}
            ]' || '[]'
          ) }}
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - name: Install dependencies
        run: bun install

      - name: Set version
        shell: bash
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build binary
        shell: bash
        run: bun run ${{ matrix.build }}

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.os }}
          path: dist/captcha-bypass-*
          retention-days: 3

  release:
    needs: [prepare, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: dist/
          merge-multiple: true

      - name: Copy models
        run: cp -r models dist/models

      - name: List artifacts
        run: ls -lhR dist/

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          draft: true
          allowUpdates: true
          makeLatest: false
          tag: ${{ needs.prepare.outputs.tag }}
          artifacts: 'dist/*'
          token: ${{ secrets.GITHUB_TOKEN }}
